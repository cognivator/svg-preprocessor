<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    :root {
      --palette-red: hsla(0,100%,50%,0.5);
      --palette-blue: rgba(0,0,255,0.3);
      --solid-green: hsl(120,100%,50%);
    }
  </style>
  <rect x="10" y="10" width="30" height="30" fill="var(--palette-red)" />
  <rect x="50" y="10" width="30" height="30" fill="var(--palette-blue)" />
  <rect x="10" y="50" width="30" height="30" fill="var(--solid-green)" />
</svg>